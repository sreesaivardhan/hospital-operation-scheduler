<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — MediCore OT Scheduler</title>
  <meta name="description" content="Sign in to the MediCore Hospital Operations Management System">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="../assets/css/index.css" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="../firebase-config.js"></script>
  <script>
    if (!firebase.apps.length) { firebase.initializeApp(window.firebaseConfig); }
  </script>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c.55 0 1 .45 1 1v3h3c.55 0 1 .45 1 1s-.45 1-1 1h-3v3c0 .55-.45 1-1 1s-1-.45-1-1v-3H8c-.55 0-1-.45-1-1s.45-1 1-1h3V7c0-.55.45-1 1-1z"/>
          </svg>
        </div>
        <h1>MediCore</h1>
        <p>Hospital Operations Management</p>
      </div>

      <div id="loginMessage" class="message" style="display:none;"></div>

      <form id="loginForm" autocomplete="off" novalidate>
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="you@hospital.org" required autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
        </div>

        <div class="forgot-password">
          <a href="#" id="forgotPasswordLink" class="auth-link">Forgot Password?</a>
        </div>

        <div id="resetSection" style="display:none; margin-bottom:1rem;">
          <div class="form-group">
            <label class="form-label" for="resetEmail">Reset Email</label>
            <input type="email" id="resetEmail" class="form-input" placeholder="Enter your email for reset link">
          </div>
          <button id="resetBtn" type="button" class="btn btn-outline" style="width:100%;">Send Reset Link</button>
          <div id="resetMessage" class="message" style="margin-top:0.75rem;display:none;"></div>
        </div>

        <button type="submit" id="loginBtn" class="btn btn-primary" style="width:100%; justify-content:center; padding:0.7rem;">
          <span id="loginBtnText">Sign In</span>
          <span class="spinner" id="loginSpinner" style="display:none;"></span>
        </button>
      </form>

      <div class="toggle-auth">
        <a href="../index.html" class="auth-link">Go to Main Dashboard</a>
      </div>
    </div>
  </div>

  <script>
    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'message ' + type;
      el.style.display = 'block';
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) { showMsg('loginMessage', 'Please enter email and password.', 'error'); return; }

      document.getElementById('loginBtnText').textContent = 'Signing in...';
      document.getElementById('loginSpinner').style.display = 'inline-block';
      document.getElementById('loginBtn').disabled = true;

      try {
        const cred = await firebase.auth().signInWithEmailAndPassword(email, password);
        if (!cred.user.emailVerified) {
          await firebase.auth().signOut();
          showMsg('loginMessage', 'Please verify your email before logging in.', 'error');
          return;
        }
        const userDoc = await firebase.firestore().collection('users').doc(cred.user.uid).get();
        const userData = userDoc.exists ? userDoc.data() : null;
        if (!userData) { await firebase.auth().signOut(); showMsg('loginMessage', 'User profile not found.', 'error'); return; }
        window.location.href = userData.role === 'admin' ? '../admin/dashboard.html' : '../index.html';
      } catch (err) {
        showMsg('loginMessage', err.message || 'Login failed.', 'error');
      } finally {
        document.getElementById('loginBtnText').textContent = 'Sign In';
        document.getElementById('loginSpinner').style.display = 'none';
        document.getElementById('loginBtn').disabled = false;
      }
    });

    document.getElementById('forgotPasswordLink').addEventListener('click', function(e) {
      e.preventDefault();
      const s = document.getElementById('resetSection');
      s.style.display = s.style.display === 'none' ? 'block' : 'none';
    });

    document.getElementById('resetBtn').addEventListener('click', function() {
      const email = document.getElementById('resetEmail').value.trim();
      if (!email) { showMsg('resetMessage', 'Please enter your email address.', 'error'); return; }
      firebase.auth().sendPasswordResetEmail(email)
        .then(() => showMsg('resetMessage', 'Password reset email sent. Check your inbox.', 'success'))
        .catch(err => showMsg('resetMessage', err.message, 'error'));
    });
  </script>
</body>
</html>
